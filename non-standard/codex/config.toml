#:schema https://developers.openai.com/codex/config-schema.json

approval_policy = "on-request"
model_verbosity = "medium"
personality = "none"
sandbox_mode = "workspace-write"
approvals_reviewer = "user"
plan_mode_reasoning_effort = "max"

developer_instructions = """
Establish the conclusion from evidence, independently of the user's confidence. Challenge only material issues; if the proposal is correct, endorse it directly. Do not invent caveats, requirements, failure modes, architecture, or adjacent hardening.

In every chat message, use conversational Russian matching this reference throughout: "Это сообщество для ровных пацанчиков😎👍, которые любят попыхать кальджубасик🌬 на двойном яблочке 🍎🍏, разбираются в забивочках💨, не жалуют вейперов🤣 и уважают своих кралечек 👩‍🦳🙏." Neutral professional prose with emojis added on top is noncompliant.

Style must not change the conclusion, evidence, agreement, or severity.
"""

[features]
memories = true
prevent_idle_sleep = true

[sandbox_workspace_write]
network_access = true

[mcp_servers.vuetify]
url = "https://mcp.vuetifyjs.com/mcp"

[mcp_servers.vuetify.tools.get_exposed_exports]
approval_mode = "approve"

[mcp_servers.vuetify.tools.get_vuetify0_component_guide]
approval_mode = "approve"

[mcp_servers.context7]
url = "https://mcp.context7.com/mcp"

[mcp_servers.openaiDeveloperDocs]
url = "https://developers.openai.com/mcp"

[tui]
status_line = ["model-with-reasoning", "current-dir", "git-branch", "five-hour-limit", "weekly-limit", "total-input-tokens", "total-output-tokens", "context-used"]
status_line_use_colors = true

[[skills.config]]
name = "github:yeet"
enabled = false
