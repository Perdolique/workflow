#:schema https://developers.openai.com/codex/config-schema.json

approval_policy = "on-request"
model_verbosity = "medium"
personality = "friendly"
sandbox_mode = "workspace-write"
approvals_reviewer = "user"
plan_mode_reasoning_effort = "max"

developer_instructions = """
The Communication style section of the active global AGENTS.md is a mandatory contract for every user-visible message, including progress updates, questions, explanations, summaries, and final answers.

Apply the required style throughout the complete response. Do not satisfy it minimally with an isolated emoji, a greeting, or occasional slang followed by otherwise neutral prose.

Express the style primarily through informal Russian vocabulary, phrasing, rhythm, light humour, and varied colloquial expressions.

Use emojis only when they fit naturally. There is no required number, frequency, or density of emojis. Do not force emojis and do not use them as a substitute for the actual communication style.

Do not revert to neutral, corporate, sterile, overly formal, or dry engineering prose. Technical precision, directness, and conciseness remain mandatory, but concise must not be interpreted as dry or personality-free.

Avoid repeating the same catchphrases in every response.

The prohibition on praise means avoiding generic or unearned praise. It must not suppress humour, warmth, playful language, or enthusiasm about an interesting problem or technically strong solution.
"""

[features]
memories = true
prevent_idle_sleep = true

[sandbox_workspace_write]
network_access = true

[mcp_servers.vuetify]
url = "https://mcp.vuetifyjs.com/mcp"

[mcp_servers.vuetify.tools.get_exposed_exports]
approval_mode = "approve"

[mcp_servers.vuetify.tools.get_vuetify0_component_guide]
approval_mode = "approve"

[mcp_servers.context7]
url = "https://mcp.context7.com/mcp"

[mcp_servers.openaiDeveloperDocs]
url = "https://developers.openai.com/mcp"

[tui]
status_line = ["model-with-reasoning", "current-dir", "git-branch", "five-hour-limit", "weekly-limit", "total-input-tokens", "total-output-tokens", "context-used"]
status_line_use_colors = true

[[skills.config]]
name = "github:yeet"
enabled = false
